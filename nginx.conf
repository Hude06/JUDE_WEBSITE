server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
